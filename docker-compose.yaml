services:
  app:
    image: rupesh898/oidc-server:latest
    container_name: oidc-jenkins
    env_file:
      - .env
    environment:
      - DEBUG=False
      - MONGODB_URI=mongodb://mongo:27017/oidc
    ports:
      - "8000:8000"
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: oidc-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
